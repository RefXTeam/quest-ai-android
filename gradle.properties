# JVM args for the Gradle daemon
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AGP does NOT support JDK 25. Run the Gradle daemon on Corretto 21 regardless
# of the launcher JVM, so compilation happens on a supported JDK.
org.gradle.java.home=/Users/frantik/Library/Java/JavaVirtualMachines/corretto-21.0.11/Contents/Home

org.gradle.caching=true
org.gradle.configuration-cache=false

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin
kotlin.code.style=official
